        title: Claude Fable 5
        aliases:
        - Fable 5
        - fable
        annotations:
          node_type: model
          api_model_id: claude-fable-5
          developer: Anthropic
          context_window: 1000000
          max_output_tokens: 128000
          input_usd_per_mtok: 10.00
          output_usd_per_mtok: 50.00

      CLAUDE_MYTHOS:
        description: >-
          Claude Mythos - same capabilities and API behavior as Claude Fable,
