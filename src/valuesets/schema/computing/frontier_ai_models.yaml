name: valuesets-computing-frontier-ai-models
title: Frontier AI Model Value Sets
description: >-
  A hierarchical value set of frontier large language / foundation models,
  organized as provider > model family > specific model release. Leaf nodes use
  the canonical model identifier as used in the providers' APIs and "/model"
  selectors (e.g. claude-opus-4-8, gpt-5.5, gemini-3.5-flash). Intermediate nodes
  group models by developer and family. Per-model metadata (knowledge/training
  cutoff, context window, max output tokens, release date, links to model cards)
  is attached as annotations and see_also links where available.

  NOTE: The frontier model landscape changes rapidly; values reflect the state of
  provider documentation as of mid-2026. Canonical API identifiers for
  open-weight models (Llama, DeepSeek, Mistral, Kimi) can vary between inference
  hosts; the identifiers given are the developer's reference names.
id: https://w3id.org/valuesets/computing/frontier_ai_models
imports:
- linkml:types
prefixes:
  linkml: https://w3id.org/linkml/
  valuesets: https://w3id.org/valuesets/
  orcid: https://orcid.org/
  valuesets_meta: https://w3id.org/valuesets/meta/
default_prefix: valuesets

slots:
  frontier_model:
    description: A frontier AI model, its family, or its developer
    range: FrontierModelEnum

enums:
  FrontierModelEnum:
    title: Frontier AI Model
    description: >-
      Hierarchical enumeration of frontier AI models. The hierarchy has three
      tiers: developer (e.g. ANTHROPIC), model family (e.g. CLAUDE_OPUS), and
      specific model release identified by its canonical API model id
      (e.g. claude-opus-4-8). Intermediate developer and family nodes are
      uppercase categorical values; leaf nodes are the verbatim API identifiers.
    status: DRAFT
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    permissible_values:

      ##########################################################################
      # Anthropic
      ##########################################################################
      ANTHROPIC:
        description: Models developed by Anthropic (the Claude family)
        annotations:
          node_type: developer
          homepage: https://www.anthropic.com
        see_also:
        - https://docs.claude.com/en/docs/about-claude/models/overview

      CLAUDE_OPUS:
        description: Claude Opus - Anthropic's most capable Opus-tier model family
        is_a: ANTHROPIC
        annotations:
          node_type: family
          tier: most capable

      claude-opus-4-8:
        description: >-
          Claude Opus 4.8 - Anthropic's most capable Opus-tier model; highly
          autonomous, state-of-the-art on long-horizon agentic work, knowledge
          work, and memory. Adaptive thinking only.
        is_a: CLAUDE_OPUS
        title: Claude Opus 4.8
        aliases:
        - Opus 4.8
        - opus
        annotations:
          node_type: model
          api_model_id: claude-opus-4-8
          developer: Anthropic
          context_window: 1000000
          max_output_tokens: 128000
          input_usd_per_mtok: 5.00
          output_usd_per_mtok: 25.00
        see_also:
        - https://docs.claude.com/en/docs/about-claude/models/overview

      claude-opus-4-7:
        description: >-
          Claude Opus 4.7 - previous-generation Opus; highly autonomous, strong on
          long-horizon agentic work, vision, and memory. Adaptive thinking only.
        is_a: CLAUDE_OPUS
        title: Claude Opus 4.7
        aliases:
        - Opus 4.7
        annotations:
          node_type: model
          api_model_id: claude-opus-4-7
          developer: Anthropic
          context_window: 1000000
          max_output_tokens: 128000

      claude-opus-4-6:
        description: >-
          Claude Opus 4.6 - older Opus model supporting adaptive thinking and 128K
          max output tokens.
        is_a: CLAUDE_OPUS
        title: Claude Opus 4.6
        aliases:
