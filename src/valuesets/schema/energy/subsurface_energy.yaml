name: valuesets-energy-subsurface-energy
title: Subsurface Energy Value Sets
description: >-
  Value sets for subsurface energy resources and storage technologies
  relevant to the DOE Unleashing Subsurface Strategic Energy Assets challenge
id: https://w3id.org/valuesets/energy/subsurface_energy
imports:
- linkml:types
prefixes:
  linkml: https://w3id.org/linkml/
  valuesets: https://w3id.org/valuesets/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  OEO: https://openenergyplatform.org/ontology/oeo/OEO_
  orcid: https://orcid.org/
  valuesets_meta: https://w3id.org/valuesets/meta/
default_prefix: valuesets
slots:
  subsurface_energy_resource:
    description: Type of subsurface energy resource
    range: SubsurfaceEnergyResourceType
  subsurface_storage:
    description: Type of subsurface energy storage
    range: SubsurfaceStorageType
  reservoir_characterization_method:
    description: Method used for reservoir characterization
    range: ReservoirCharacterizationMethodType
enums:
  SubsurfaceEnergyResourceType:
    title: Subsurface Energy Resource Type
    description: >-
      Types of subsurface energy resources including geothermal, hydrocarbon,
      and other geological energy assets
    status: DRAFT
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      GEOTHERMAL_RESERVOIR:
        description: Natural subsurface reservoir containing hot water or steam suitable for geothermal energy extraction
        broad_mappings:
        - ENVO:2000034
        annotations:
          temperature_range: 90-350 C
          resource_type: renewable
      ENHANCED_GEOTHERMAL_SYSTEM:
        description: Engineered subsurface reservoir created by hydraulic stimulation of hot dry rock for geothermal energy
        annotations:
          abbreviation: EGS
          resource_type: renewable
      OIL_RESERVOIR:
        title: oil reservoir
        description: Subsurface formation containing fluid hydrocarbons in porous or fractured rock
        meaning: ENVO:00002185
      NATURAL_GAS_RESERVOIR:
        description: Subsurface formation containing natural gas trapped in porous or fractured rock
        annotations:
          resource_type: fossil fuel
      COALBED_METHANE:
        description: Methane gas adsorbed in coal seams that can be extracted as an energy resource
        annotations:
          abbreviation: CBM
          resource_type: fossil fuel
      GAS_HYDRATE:
        title: methane clathrate
        description: Crystalline ice-like structures containing methane trapped in water molecule cages, found in ocean sediments and permafrost regions
        meaning: ENVO:01000851
      HOT_DRY_ROCK:
        description: Deep crystalline basement rock with high temperature but low natural permeability, targeted for enhanced geothermal systems
        annotations:
          typical_depth: '>3 km'
          temperature: '>150 C'
      SEDIMENTARY_BASIN:
        description: Large-scale geological depression filled with sedimentary rocks that may contain energy resources
        close_mappings:
        - ENVO:01000275
        annotations:
          resource_potential: hydrocarbons, geothermal, CO2 storage
      VOLCANIC_SYSTEM:
        title: volcanic field
        description: Volcanic geological system with high geothermal gradients suitable for energy extraction
        meaning: ENVO:00000354
  SubsurfaceStorageType:
    title: Subsurface Storage Type
    description: >-
      Types of subsurface energy and material storage technologies
      utilizing geological formations
    status: DRAFT
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      CARBON_CAPTURE_AND_STORAGE:
        title: carbon capture and storage
        description: Capture of CO2 from industrial sources and injection into deep geological formations for permanent storage
        close_mappings:
        - OEO:00010141
        related_mappings:
        - ENVO:04000017
        annotations:
          abbreviation: CCS
          target_formations: saline aquifers, depleted reservoirs
      HYDROGEN_STORAGE:
        title: underground hydrogen storage object
        description: Underground storage of hydrogen gas in geological formations such as salt caverns or depleted reservoirs
        close_mappings:
        - OEO:00000429
        annotations:
          formations: salt caverns, depleted gas fields, aquifers
      COMPRESSED_AIR_ENERGY_STORAGE:
        title: compressed-air energy storage unit
        description: Storage of compressed air in underground caverns for later electricity generation
        close_mappings:
        - OEO:00020249
        annotations:
          abbreviation: CAES
          formations: salt caverns, hard rock caverns
      NATURAL_GAS_STORAGE:
        description: Underground storage of natural gas in geological formations for seasonal demand management
        annotations:
          formations: depleted reservoirs, aquifers, salt caverns
      THERMAL_ENERGY_STORAGE:
        title: thermal energy storage object
        description: Storage of thermal energy in subsurface formations for heating and cooling applications
        close_mappings:
        - OEO:00020365
        annotations:
          types: aquifer thermal energy storage, borehole thermal energy storage
      NUCLEAR_WASTE_REPOSITORY:
        description: Deep geological repository for permanent disposal of high-level nuclear waste
        annotations:
          formations: crystalline rock, clay, salt
          depth: '>300 m'
  ReservoirCharacterizationMethodType:
    title: Reservoir Characterization Method Type
    description: >-
      Methods and techniques used to characterize subsurface reservoirs
      for energy extraction and storage applications
    status: DRAFT
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      WELL_TEST_ANALYSIS:
        description: Analysis of pressure and flow rate data from well tests to determine reservoir properties
        annotations:
          parameters: permeability, skin factor, reservoir boundaries
      SEISMIC_INTERPRETATION:
        description: Interpretation of seismic survey data to map subsurface geological structures and properties
        annotations:
          types: 2D seismic, 3D seismic, 4D time-lapse
      CORE_ANALYSIS:
        description: Laboratory analysis of rock core samples to determine petrophysical and geomechanical properties
        annotations:
          measurements: porosity, permeability, saturation, mechanical strength
      WIRELINE_LOGGING:
        description: Measurement of formation properties using instruments lowered into a wellbore on a wireline
        annotations:
          logs: gamma ray, resistivity, neutron, density, sonic
      TRACER_TEST:
        description: Injection and monitoring of chemical or radioactive tracers to characterize fluid flow paths
        annotations:
          purpose: flow path identification, residence time distribution
      PRESSURE_TRANSIENT_ANALYSIS:
        description: Analysis of pressure changes over time during well operations to infer reservoir characteristics
        annotations:
          tests: drawdown, buildup, interference
      PRODUCTION_HISTORY_MATCHING:
        description: Calibration of reservoir simulation models by matching historical production data
        annotations:
          approach: inverse modeling, parameter estimation
      GEOSTATISTICAL_MODELING:
        description: Statistical methods for spatial interpolation and uncertainty quantification of reservoir properties
        annotations:
          methods: kriging, sequential Gaussian simulation, multiple-point statistics
