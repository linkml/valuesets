name: mining_processing
title: Mining and Mineral Processing Value Sets
description: Value sets for mining operations, mineral processing, beneficiation, and in-situ extraction, including 
  bioleaching and autonomous mining systems.
id: https://w3id.org/valuesets/mining-processing
version: 1.0.0
status: release
imports:
- linkml:types
- ./core
prefixes:
  linkml: https://w3id.org/linkml/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  OBI: http://purl.obolibrary.org/obo/OBI_
  PATO: http://purl.obolibrary.org/obo/PATO_
  valuesets: https://w3id.org/valuesets/
  orcid: https://orcid.org/
  valuesets_meta: https://w3id.org/valuesets/meta/
default_prefix: valuesets
default_curi_maps:
- semweb_context
slots:
  mineralogy_feedstock:
    description: Types of mineral feedstock sources for extraction and processing operations, including primary and 
      secondary sources
    range: MineralogyFeedstockClass
    required: true
    comments:
    - Required field for mining operation records
    - Manual customization - do not modify
  beneficiation_pathway:
    description: Methods for mineral separation and concentration aligned with advanced ore processing initiatives 
      (AOI-2)
    range: BeneficiationPathway
  in_situ_chemistry_regime:
    description: Chemical leaching systems for in-situ extraction with associated parameters including pH, Eh, 
      temperature, and ionic strength
    range: InSituChemistryRegime
  extractable_target_element:
    description: Target elements for extraction, particularly rare earth elements (REE) and critical minerals
    range: ExtractableTargetElement
    multivalued: true
  sensor_while_drilling_feature:
    description: Measurement while drilling (MWD) and logging while drilling (LWD) features for orebody ML and 
      geosteering applications
    range: SensorWhileDrillingFeature
    multivalued: true
  process_performance_metric:
    description: Key performance indicators for mining and processing operations tied to SMART milestones and 
      sustainability goals
    range: ProcessPerformanceMetric
    multivalued: true
  bioleach_organism:
    description: Microorganisms used in bioleaching and biomining operations, including engineered strains
    range: BioleachOrganism
  bioleach_mode:
    description: Mechanisms of bioleaching including indirect and direct bacterial action
    range: BioleachMode
  autonomy_level:
    description: Levels of autonomy for mining systems including drilling, hauling, and sorting robots (relevant for 
      Topic 1 initiatives)
    range: AutonomyLevel
  regulatory_constraint:
    description: Regulatory and community constraints affecting mining operations, particularly for in-situ extraction 
      and community engagement
    range: RegulatoryConstraint
    multivalued: true
enums:
  MineralogyFeedstockClass:
    title: Mineralogy Feedstock Class
    description: 'Types of mineral feedstock sources for extraction and processing operations, including primary and secondary
      sources.

      '
    status: DRAFT
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      HARDROCK_PRIMARY:
        title: HARDROCK_PRIMARY
        description: Primary ore from hardrock mining operations
      TAILINGS_LEGACY:
        title: TAILINGS_LEGACY
        description: Historical mine tailings available for reprocessing
      WASTE_PILES:
        title: WASTE_PILES
        description: Accumulated mining waste materials
      COAL_BYPRODUCT:
        title: COAL_BYPRODUCT
        description: Byproducts from coal mining and processing
      E_WASTE:
        title: E_WASTE
        description: Electronic waste containing recoverable metals
      BRINES:
        title: BRINES
        description: Saline water sources containing dissolved minerals
  BeneficiationPathway:
    title: Beneficiation Pathway
    description: 'Methods for mineral separation and concentration aligned with advanced ore processing initiatives (AOI-2).

      '
    status: DRAFT
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      ORE_SORTING:
        description: Sensor-based sorting of ore particles
      DENSE_MEDIUM_SEPARATION:
        description: Gravity separation using dense media
      MICROWAVE_PREWEAKENING:
        description: Microwave treatment to weaken ore structure
      ELECTRIC_PULSE_PREWEAKENING:
        description: High-voltage electric pulse fragmentation
      GRINDING_DYNAMIC:
        description: Dynamic grinding optimization systems
      ELECTROSTATIC_SEP:
        description: Electrostatic separation of minerals
      MAGNETIC_SEP:
        description: Magnetic separation of ferromagnetic minerals
      FLOTATION_LOW_H2O:
        description: Low-water flotation processes
      BIO_BENEFICIATION:
        description: Biological methods for mineral beneficiation
  InSituChemistryRegime:
    title: In Situ Chemistry Regime
    description: 'Chemical leaching systems for in-situ extraction with associated parameters including pH, Eh, temperature,
      and ionic strength.

      '
    status: DRAFT
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      ACIDIC_SULFATE:
        title: ACIDIC_SULFATE
        description: Sulfuric acid-based leaching system
      ACIDIC_CHLORIDE:
        title: ACIDIC_CHLORIDE
        description: Hydrochloric acid or chloride-based leaching
      AMMONIA_BASED:
        title: AMMONIA_BASED
        description: Ammonia or ammonium-based leaching system
      ORGANIC_ACID:
        description: Organic acid leaching (citric, oxalic, etc.)
      BIOLEACH_SULFUR_OXIDIZING:
        description: Bioleaching using sulfur-oxidizing bacteria
      BIOLEACH_IRON_OXIDIZING:
        description: Bioleaching using iron-oxidizing bacteria
  ExtractableTargetElement:
    title: Extractable Target Elements
    description: >-
      Target elements for extraction in mining operations, including rare earth elements (REE),
      critical minerals, and battery metals. These elements are strategically important for
      clean energy technologies, electronics, and defense applications.
    status: DRAFT
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      LA:
        title: Lanthanum
        aliases:
        - lanthanum atom
        description: Light rare earth element (atomic number 57) used in catalysts, optics, and battery electrodes
        meaning: CHEBI:33336
      CE:
        title: Cerium
        aliases:
        - cerium
        description: Light rare earth element (atomic number 58) used in catalytic converters, glass polishing, and metallurgy
        meaning: CHEBI:33369
      PR:
        title: Praseodymium
        aliases:
        - praseodymium atom
        description: Light rare earth element (atomic number 59) used in magnets, lasers, and aircraft engines
        meaning: CHEBI:49828
      ND:
        title: Neodymium
        aliases:
        - neodymium atom
        description: Light rare earth element (atomic number 60) essential for high-strength permanent magnets in wind turbines and EVs
        meaning: CHEBI:33372
      PM:
        title: Promethium
        aliases:
        - promethium atom
        description: Radioactive rare earth element (atomic number 61) used in nuclear batteries and luminous paint
        meaning: CHEBI:33373
      SM:
        title: Samarium
        aliases:
        - samarium atom
        description: Light rare earth element (atomic number 62) used in samarium-cobalt magnets and cancer treatment
        meaning: CHEBI:33374
      EU:
        title: Europium
        aliases:
        - europium atom
        description: Rare earth element (atomic number 63) used in phosphors for displays and fluorescent lighting
        meaning: CHEBI:32999
      GD:
        title: Gadolinium
        aliases:
        - gadolinium atom
        description: Heavy rare earth element (atomic number 64) used in MRI contrast agents and nuclear reactor control rods
        meaning: CHEBI:33375
      TB:
        title: Terbium
        aliases:
        - terbium atom
        description: Heavy rare earth element (atomic number 65) used in solid-state devices and green phosphors
        meaning: CHEBI:33376
      DY:
        title: Dysprosium
        aliases:
        - dysprosium atom
        description: Heavy rare earth element (atomic number 66) critical for high-temperature permanent magnets
        meaning: CHEBI:33377
      HO:
        title: Holmium
        aliases:
        - holmium atom
        description: Heavy rare earth element (atomic number 67) used in lasers and magnetic flux concentrators
        meaning: CHEBI:49648
      ER:
        title: Erbium
        aliases:
        - erbium
        description: Heavy rare earth element (atomic number 68) used in fiber optic amplifiers and lasers
        meaning: CHEBI:33379
      TM:
        title: Thulium
        aliases:
        - thulium atom
        description: Heavy rare earth element (atomic number 69) used in portable X-ray devices and lasers
        meaning: CHEBI:33380
      YB:
        title: Ytterbium
        aliases:
        - ytterbium
        description: Heavy rare earth element (atomic number 70) used in metallurgy, lasers, and atomic clocks
        meaning: CHEBI:33381
      LU:
        title: Lutetium
        aliases:
        - lutetium atom
        description: Heavy rare earth element (atomic number 71) used in PET scan detectors and cancer treatment
        meaning: CHEBI:33382
      SC:
        title: Scandium
        aliases:
        - scandium atom
        description: Transition metal (atomic number 21) used in aluminum alloys for aerospace and sports equipment
        meaning: CHEBI:33330
      CO:
        title: Cobalt
        aliases:
        - cobalt atom
        description: Transition metal (atomic number 27) essential for lithium-ion battery cathodes and superalloys
        meaning: CHEBI:27638
      NI:
        title: Nickel
        aliases:
        - nickel atom
        description: Transition metal (atomic number 28) used in stainless steel, batteries, and electroplating
        meaning: CHEBI:28112
      LI:
        title: Lithium
        aliases:
        - lithium atom
        description: Alkali metal (atomic number 3) essential for lithium-ion batteries and energy storage systems
        meaning: CHEBI:30145
  SensorWhileDrillingFeature:
    title: Sensor While Drilling Feature
    description: 'Measurement while drilling (MWD) and logging while drilling (LWD) features for orebody ML and geosteering
      applications.

      '
    status: DRAFT
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      WOB:
        description: Weight on bit measurement
      ROP:
        description: Rate of penetration
      TORQUE:
        description: Rotational torque measurement
      MWD_GAMMA:
        description: Gamma ray logging while drilling
      MWD_RESISTIVITY:
        description: Resistivity logging while drilling
      MUD_LOSS:
        description: Drilling mud loss measurement
      VIBRATION:
        description: Drill string vibration monitoring
      RSS_ANGLE:
        description: Rotary steerable system angle
  ProcessPerformanceMetric:
    title: Process Performance Metric
    description: 'Key performance indicators for mining and processing operations tied to SMART milestones and sustainability
      goals.

      '
    status: DRAFT
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      RECOVERY_PCT:
        description: Percentage recovery of target material
      SELECTIVITY_INDEX:
        description: Selectivity index for separation processes
      SPECIFIC_ENERGY_KWH_T:
        description: Specific energy consumption in kWh per tonne
      WATER_INTENSITY_L_T:
        description: Water usage intensity in liters per tonne
      REAGENT_INTENSITY_KG_T:
        description: Reagent consumption in kg per tonne
      CO2E_KG_T:
        description: CO2 equivalent emissions in kg per tonne
      TAILINGS_MASS_REDUCTION_PCT:
        description: Percentage reduction in tailings mass
  BioleachOrganism:
    title: Bioleach Organism
    description: 'Microorganisms used in bioleaching and biomining operations, including engineered strains.

      '
    status: DRAFT
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      ACIDITHIOBACILLUS_FERROOXIDANS:
        description: Iron and sulfur oxidizing bacterium
        meaning: NCBITaxon:920
      LEPTOSPIRILLUM_FERROOXIDANS:
        description: Iron oxidizing bacterium
        meaning: NCBITaxon:180
      ASPERGILLUS_NIGER:
        description: Organic acid producing fungus
        meaning: NCBITaxon:5061
      ENGINEERED_STRAIN:
        description: Genetically modified organism for enhanced bioleaching
  BioleachMode:
    title: Bioleach Mode
    description: 'Mechanisms of bioleaching including indirect and direct bacterial action.

      '
    status: DRAFT
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      INDIRECT_BIOLEACH_ORGANIC_ACIDS:
        description: Indirect bioleaching through organic acid production
      SULFUR_OXIDATION:
        description: Direct bacterial oxidation of sulfur compounds
      IRON_OXIDATION:
        description: Direct bacterial oxidation of iron compounds
  AutonomyLevel:
    title: Autonomy Level
    description: 'Levels of autonomy for mining systems including drilling, hauling, and sorting robots (relevant for Topic
      1 initiatives).

      '
    status: DRAFT
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      ASSISTIVE:
        description: Human operator with assistive technologies
      SUPERVISED_AUTONOMY:
        description: Autonomous operation with human supervision
      SEMI_AUTONOMOUS:
        description: Partial autonomy with human intervention capability
      FULLY_AUTONOMOUS:
        description: Complete autonomous operation without human intervention
  RegulatoryConstraint:
    title: Regulatory Constraint
    description: 'Regulatory and community constraints affecting mining operations, particularly for in-situ extraction and
      community engagement.

      '
    status: DRAFT
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      AQUIFER_PROTECTION:
        title: AQUIFER_PROTECTION
        description: Requirements for groundwater and aquifer protection
      EMISSIONS_CAP:
        description: Limits on atmospheric emissions
      CULTURAL_HERITAGE_ZONE:
        description: Protection of cultural heritage sites
      WATER_RIGHTS_LIMIT:
        description: Restrictions based on water usage rights
